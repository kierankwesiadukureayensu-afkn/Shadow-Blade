<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sailor Realm Mini</title>
  <style>
    body { margin:0; background:#020617; font-family:Arial; overflow:hidden; }
    canvas { display:block; margin:auto; background:#0ea5e9; }
    #ui {
      position:absolute;
      top:10px;
      left:10px;
      color:white;
      font-size:14px;
      background:rgba(0,0,0,0.4);
      padding:10px;
      border-radius:8px;
    }
    #menu {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:#111827;
      color:white;
      padding:20px;
      border-radius:10px;
      text-align:center;
    }
    button {
      margin:5px;
      padding:10px;
      cursor:pointer;
      border:none;
      border-radius:6px;
    }
  </style>
</head>
<body>

<div id="ui">
  ❤️ HP: <span id="hp">100</span><br>
  🍎 Fruit: <span id="fruit">None</span>
</div>

<div id="menu">
  <h3>Choose Devil Fruit 🍎</h3>
  <button onclick="choose('fire')">🔥 Fire</button>
  <button onclick="choose('ice')">❄️ Ice</button>
  <button onclick="choose('lightning')">⚡ Lightning</button>
</div>

<canvas id="game" width="800" height="450"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let player = { x:400, y:225, hp:100, fruit:null };
let keys = {};

document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

function choose(f){
  player.fruit = f;
  document.getElementById("fruit").innerText = f;
  document.getElementById("menu").style.display="none";
}

function move(){
  if(keys["w"]||keys["ArrowUp"]) player.y-=3;
  if(keys["s"]||keys["ArrowDown"]) player.y+=3;
  if(keys["a"]||keys["ArrowLeft"]) player.x-=3;
  if(keys["d"]||keys["ArrowRight"]) player.x+=3;
}

let enemies = [
  {x:200,y:200,hp:30},
  {x:600,y:300,hp:30}
];

document.addEventListener("keydown", e=>{
  if(e.code==="Space"){
    skill();
  }
});

function skill(){
  enemies.forEach(e=>{
    let dx = e.x-player.x;
    let dy = e.y-player.y;
    let dist = Math.sqrt(dx*dx+dy*dy);

    if(dist<100){
      e.hp -= 20;
    }
  });
}

function drawOcean(){
  ctx.fillStyle="#0284c7";
  ctx.fillRect(0,0,800,450);
}

function drawIslands(){
  ctx.fillStyle="#166534";
  ctx.fillRect(150,120,160,100);
  ctx.fillRect(500,260,180,120);
}

function drawPlayer(){
  ctx.fillStyle = player.fruit==="fire"?"orange":
                  player.fruit==="ice"?"cyan":
                  player.fruit==="lightning"?"yellow":"white";

  ctx.beginPath();
  ctx.arc(player.x,player.y,12,0,Math.PI*2);
  ctx.fill();
}

function drawEnemies(){
  enemies.forEach((e,i)=>{
    if(e.hp<=0){ enemies.splice(i,1); return; }

    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(e.x,e.y,10,0,Math.PI*2);
    ctx.fill();

    // simple AI
    let dx = player.x - e.x;
    let dy = player.y - e.y;
    e.x += dx*0.01;
    e.y += dy*0.01;

    // damage
    let dist = Math.sqrt(dx*dx+dy*dy);
    if(dist<15){
      player.hp -= 0.2;
    }
  });
}

function loop(){
  ctx.clearRect(0,0,800,450);

  drawOcean();
  drawIslands();

  move();
  drawPlayer();
  drawEnemies();

  document.getElementById("hp").innerText = Math.floor(player.hp);

  if(player.hp<=0){
    alert("You died!");
    location.reload();
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
<script>
let npcAlive = true;

function spawnNPC() {
  const npc = document.createElement("div");
  npc.innerText = "NPC";
  npc.style.position = "absolute";
  npc.style.left = "100px";
  npc.style.top = "100px";
  npc.style.background = "red";
  npc.style.padding = "10px";

  document.body.appendChild(npc);

  npc.onclick = () => {
    npc.remove();
    npcAlive = false;

    setTimeout(() => {
      spawnNPC(); // respawn
      npcAlive = true;
    }, 3000);
  };
}

spawnNPC();
</script>
