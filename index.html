<!DOCTYPE html>
<html>
<head>
  <title>Sailor MMO V7</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #1e90ff;
      font-family: Arial;
    }

    #world {
      position: absolute;
      width: 5000px;
      height: 5000px;
      background: linear-gradient(#3bb3ff, #004a99);
    }

    #player {
      width: 30px;
      height: 30px;
      background: yellow;
      position: absolute;
      border-radius: 50%;
    }

    .npc {
      width: 40px;
      height: 40px;
      background: purple;
      position: absolute;
      border-radius: 50%;
    }

    .boss {
      width: 100px;
      height: 100px;
      background: darkred;
      position: absolute;
      border-radius: 50%;
    }

    #ship {
      width: 80px;
      height: 40px;
      background: brown;
      position: absolute;
      display: none;
    }

    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 10px;
      border-radius: 10px;
      width: 250px;
    }

    #dialogue {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      color: black;
      padding: 10px;
      display: none;
      border-radius: 10px;
      width: 300px;
    }
  </style>
</head>
<body>

<div id="ui">
  HP: <span id="hp">100</span><br>
  Level: <span id="level">1</span><br>
  Quest: <span id="quest">None</span><br>
  Ship: <span id="shipState">Land</span>
</div>

<div id="dialogue"></div>

<div id="world">
  <div id="player"></div>
  <div id="ship"></div>
</div>

<script>

/* ======================
   PLAYER
====================== */
let player = {
  x: 500,
  y: 500,
  speed: 6,
  hp: 100,
  level: 1,
  xp: 0,
  inShip: false,
  quest: null
};

/* ======================
   WORLD
====================== */
const world = document.getElementById("world");
const playerEl = document.getElementById("player");
const shipEl = document.getElementById("ship");

/* ======================
   ISLANDS
====================== */
let islands = [
  { x: 500, y: 500, r: 250 },
  { x: 2000, y: 800, r: 300 },
  { x: 3500, y: 2000, r: 350 }
];

islands.forEach(i => {
  let el = document.createElement("div");
  el.style.position = "absolute";
  el.style.width = i.r + "px";
  el.style.height = i.r + "px";
  el.style.left = i.x + "px";
  el.style.top = i.y + "px";
  el.style.background = "green";
  el.style.borderRadius = "50%";
  world.appendChild(el);
});

/* ======================
   NPC + QUEST SYSTEM
====================== */
let npcs = [];

function spawnNPC(x, y) {
  let el = document.createElement("div");
  el.className = "npc";

  let npc = {
    x,
    y,
    questGiven: false,
    quest: {
      name: "Kill Pirates",
      goal: 3,
      progress: 0,
      reward: 50
    },
    el
  };

  el.style.left = x + "px";
  el.style.top = y + "px";

  el.onclick = () => talkToNPC(npc);

  world.appendChild(el);
  npcs.push(npc);
}

/* ======================
   QUEST DIALOGUE SYSTEM
====================== */
const dialogue = document.getElementById("dialogue");

function talkToNPC(npc) {
  dialogue.style.display = "block";

  if (!player.quest) {
    dialogue.innerHTML = `
      <b>NPC:</b> Help me!<br>
      Quest: ${npc.quest.name}<br>
      Reward: ${npc.quest.reward} Gold<br><br>
      <button onclick="acceptQuest()">Accept</button>
    `;

    window.currentQuestNPC = npc;
  } else {
    dialogue.innerHTML = `
      <b>NPC:</b> You already have a quest!
    `;
  }
}

function acceptQuest() {
  player.quest = window.currentQuestNPC.quest;
  document.getElementById("quest").innerText = player.quest.name;
  dialogue.style.display = "none";
}

/* ======================
   SHIP SYSTEM
====================== */
let ship = {
  x: 600,
  y: 600,
  active: false,
  speed: 10
};

function toggleShip() {
  player.inShip = !player.inShip;

  ship.active = player.inShip;
  shipEl.style.display = player.inShip ? "block" : "none";
}

/* ======================
   CANNON SYSTEM
====================== */
let cannonBalls = [];

function shootCannon() {
  if (!player.inShip) return;

  cannonBalls.push({
    x: player.x,
    y: player.y,
    vx: 5,
    vy: 0
  });
}

function updateCannonBalls() {
  cannonBalls.forEach(b => {
    b.x += b.vx;
    b.y += b.vy;

    bosses.forEach(boss => {
      if (Math.hypot(b.x - boss.x, b.y - boss.y) < 60) {
        boss.hp -= 20;
      }
    });
  });
}

/* ======================
   BOSS SYSTEM
====================== */
let bosses = [
  { x: 2500, y: 1500, hp: 300, el: document.createElement("div") }
];

bosses.forEach(b => {
  b.el.className = "boss";
  world.appendChild(b.el);
});

/* ======================
   MOVEMENT + CAMERA
====================== */
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function move() {
  let speed = player.inShip ? ship.speed : player.speed;

  if (keys["w"]) player.y -= speed;
  if (keys["s"]) player.y += speed;
  if (keys["a"]) player.x -= speed;
  if (keys["d"]) player.x += speed;

  world.style.transform =
    `translate(${-player.x + 400}px, ${-player.y + 300}px)`;

  playerEl.style.left = player.x + "px";
  playerEl.style.top = player.y + "px";

  if (player.inShip) {
    ship.x = player.x;
    ship.y = player.y;

    shipEl.style.left = ship.x + "px";
    shipEl.style.top = ship.y + "px";
  }
}

/* ======================
   QUEST PROGRESSION
====================== */
function updateQuest() {
  if (!player.quest) return;

  player.quest.progress++;

  if (player.quest.progress >= player.quest.goal) {
    alert("Quest Complete!");
    player.xp += player.quest.reward;
    player.quest = null;
    document.getElementById("quest").innerText = "None";
  }
}

/* ======================
   BOSS AI
====================== */
function bossAI() {
  bosses.forEach(b => {
    b.x += (player.x - b.x) * 0.01;
    b.y += (player.y - b.y) * 0.01;

    b.el.style.left = b.x + "px";
    b.el.style.top = b.y + "px";
  });
}

/* ======================
   INPUT ACTIONS
====================== */
document.addEventListener("keydown", e => {
  if (e.key === " ") updateQuest();
  if (e.key === "e") toggleShip();
  if (e.key === "q") shootCannon();
});

/* ======================
   SPAWN WORLD
====================== */
spawnNPC(1200, 1200);
spawnNPC(3000, 1800);

/* ======================
   GAME LOOP
====================== */
function loop() {
  move();
  bossAI();
  updateCannonBalls();

  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
