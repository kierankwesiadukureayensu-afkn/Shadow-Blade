<!DOCTYPE html>
<html>
<head>
<title>Anime MMO Engine V15</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #1aa7ff, #001b3a);
  font-family: Arial;
}

#world {
  position: absolute;
  width: 5000px;
  height: 5000px;
  background: radial-gradient(circle, #2ec5ff, #003a70);
}

#player {
  width: 35px;
  height: 35px;
  position: absolute;
  border-radius: 50%;
  background: yellow;
  box-shadow: 0 0 20px yellow;
}

.boss {
  width: 120px;
  height: 120px;
  position: absolute;
  border-radius: 50%;
  background: darkred;
  box-shadow: 0 0 40px red;
}

.island {
  position: absolute;
  background: green;
  border-radius: 50%;
}

#dialogue {
  position: fixed;
  bottom: 20px;
  width: 60%;
  left: 20%;
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 20px;
  font-size: 18px;
  display: none;
  border-radius: 10px;
  text-align: center;
}

#controls {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="controls">
WASD Move<br>
SPACE Attack<br>
F Fruit<br>
T Quest<br>
G Gear 5
</div>

<div id="dialogue"></div>

<div id="world">
  <div id="player"></div>
</div>

<script>

/* ======================
   CORE PLAYER
====================== */
let player = {
  x: 600,
  y: 600,
  speed: 6,
  hp: 100,
  power: 1
};

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

const world = document.getElementById("world");
const playerEl = document.getElementById("player");
const dialogue = document.getElementById("dialogue");

/* ======================
   STORY SYSTEM
====================== */
let story = { active: false };

function startDialogue(lines, callback) {
  let i = 0;
  story.active = true;
  dialogue.style.display = "block";

  function next() {
    if (i >= lines.length) {
      dialogue.style.display = "none";
      story.active = false;
      if (callback) callback();
      return;
    }
    dialogue.innerText = lines[i++];
  }

  next();
  document.onkeydown = e => {
    if (e.key === " ") next();
  };
}

/* ======================
   TUTORIAL
====================== */
function tutorial() {
  startDialogue([
    "Welcome to the Anime Seas",
    "WASD = Move",
    "SPACE = Attack",
    "F = Fruit Awakening",
    "T = Quest",
    "G = Gear 5 Transformation"
  ]);
}

/* ======================
   FRUIT AWAKENING
====================== */
function fruit() {
  startDialogue([
    "Energy awakens inside you...",
    "⚡ Fruit Awakening ⚡"
  ], () => {
    player.power = 4;
    player.speed = 10;
    playerEl.style.background = "white";
    playerEl.style.boxShadow = "0 0 80px cyan";
  });
}

/* ======================
   GEAR 5 CINEMATIC
====================== */
function gear5() {

  startDialogue([
    "......",
    "Reality begins to break...",
    "⚡ GEAR 5 AWAKENING ⚡"
  ], () => {

    player.power = 10;
    player.speed = 16;
    playerEl.style.background = "white";
    playerEl.style.boxShadow = "0 0 120px white, 0 0 200px cyan";

    document.body.style.filter = "brightness(1.5)";
    setTimeout(() => document.body.style.filter = "none", 2000);
  });
}

/* ======================
   ISLANDS
====================== */
for (let i = 0; i < 5; i++) {
  let el = document.createElement("div");
  el.className = "island";
  el.style.width = "200px";
  el.style.height = "200px";
  el.style.left = Math.random()*4500 + "px";
  el.style.top = Math.random()*4500 + "px";
  world.appendChild(el);
}

/* ======================
   BOSSES
====================== */
let bosses = [];

function spawnBoss() {
  let el = document.createElement("div");
  el.className = "boss";

  bosses.push({
    x: Math.random()*4000,
    y: Math.random()*4000,
    hp: 400,
    phase: 1,
    el
  });

  world.appendChild(el);
}

for (let i = 0; i < 3; i++) spawnBoss();

/* ======================
   MOVEMENT
====================== */
function move() {

  if (!story.active) {
    if (keys["w"]) player.y -= player.speed;
    if (keys["s"]) player.y += player.speed;
    if (keys["a"]) player.x -= player.speed;
    if (keys["d"]) player.x += player.speed;
  }

  world.style.transform =
    `translate(${-player.x + 400}px, ${-player.y + 300}px)`;

  playerEl.style.left = player.x + "px";
  playerEl.style.top = player.y + "px";
}

/* ======================
   ATTACK
====================== */
function attack() {
  bosses.forEach(b => {
    let d = Math.hypot(player.x-b.x, player.y-b.y);
    if (d < 120) b.hp -= 10 * player.power;
  });
}

/* ======================
   BOSS AI + PHASES
====================== */
function bossAI() {
  bosses.forEach(b => {

    let r = b.hp / 400;

    if (r < 0.6) {
      b.phase = 2;
      b.el.style.background = "orange";
    }

    if (r < 0.3) {
      b.phase = 3;
      b.el.style.background = "purple";
    }

    b.x += (player.x - b.x) * 0.01 * b.phase;
    b.y += (player.y - b.y) * 0.01 * b.phase;

    b.el.style.left = b.x + "px";
    b.el.style.top = b.y + "px";
  });
}

/* ======================
   INPUTS
====================== */
document.addEventListener("keydown", e => {

  if (e.key === " ") attack();
  if (e.key === "f") fruit();
  if (e.key === "t") tutorial();
  if (e.key === "g") gear5();
});

/* ======================
   LOOP
====================== */
function loop() {
  move();
  bossAI();
  requestAnimationFrame(loop);
}

loop();

/* START */
window.onload = tutorial;

</script>

</body>
</html>
